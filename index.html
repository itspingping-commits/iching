<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="測字起卦">
<meta name="theme-color" content="#080810">
<title>測字起卦</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: #080810;
  color: #e0e0f0;
  font-family: 'Noto Serif TC', 'PingFang TC', serif;
  min-height: 100vh;
  padding-bottom: 60px;
}
.header {
  text-align: center;
  padding: 48px 16px 28px;
  background: linear-gradient(180deg, #0c0c1e, #080810);
}
.header .sub { color: #555580; font-size: 10px; letter-spacing: 6px; margin-bottom: 10px; }
.header h1 { font-size: 28px; font-weight: 700; letter-spacing: 4px; color: #e0e0f0; }
.header .yao { color: #252540; font-size: 16px; letter-spacing: 4px; margin-top: 8px; }
.header .teacher { color: #5a5a88; font-size: 10px; margin-top: 6px; }

.container { max-width: 520px; margin: 0 auto; padding: 0 16px; }

.label { color: #5a5a88; font-size: 11px; letter-spacing: 3px; margin-bottom: 10px; display: block; }

.stroke-row { display: flex; gap: 10px; margin-bottom: 20px; }
input[type=number] {
  flex: 1; background: #0e0e20; border: 1px solid #1e1e38;
  border-radius: 10px; color: #e0e0f0; font-size: 18px;
  padding: 13px 16px; font-family: inherit; outline: none;
  -webkit-appearance: none;
}
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
.preview-box {
  background: #0e0e20; border: 1px solid #1e1e38; border-radius: 10px;
  padding: 0 14px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px; min-width: 64px;
}
.preview-gua { color: #c8a96e; font-size: 16px; font-weight: 700; }
.preview-label { color: #5a5a88; font-size: 9px; }

.shichen-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 28px; }
.sh-btn {
  background: #0e0e20; border: 1px solid #1e1e38; border-radius: 10px;
  padding: 10px 4px; text-align: center; cursor: pointer; transition: all .15s;
}
.sh-btn.active { border-color: #c8a96e; background: #131830; }
.sh-zhi { font-size: 16px; font-weight: 700; color: #6870a0; display: block; }
.sh-btn.active .sh-zhi { color: #c8a96e; }
.sh-range { font-size: 8px; color: #6870a0; opacity: .75; display: block; margin-top: 2px; }
.sh-btn.active .sh-range { color: #c8a96e; }

.error { color: #ff6b8a; text-align: center; margin-bottom: 14px; font-size: 13px; }

.calc-btn {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, #c8a96e, #9a7030);
  border: none; border-radius: 12px; color: #08080e;
  font-size: 16px; font-weight: 700; font-family: inherit;
  letter-spacing: 4px; cursor: pointer; margin-bottom: 24px;
}

.result { display: flex; flex-direction: column; gap: 16px; animation: rise .4s ease; }
@keyframes rise { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }

.trail {
  background: #0c0c1c; border: 1px solid #181830;
  border-radius: 12px; padding: 14px 16px;
  font-size: 12px; color: #6870a0; line-height: 2.2;
}
.trail span { color: #e0e0f0; }
.trail .gold { color: #c8a96e; }

.hex-card {
  background: #131330; border: 1px solid #2a3560;
  border-radius: 14px; padding: 16px;
}
.hex-card.dim { background: #111128; border-color: #2a2a50; opacity: 1; }

.card-label { color: #5a5a88; font-size: 10px; letter-spacing: 3px; margin-bottom: 10px; }
.card-top { display: flex; gap: 0; align-items: center; margin-bottom: 14px; }

.card-info { flex: 1; }
.hex-name { font-size: 22px; font-weight: 700; color: #e0e0f0; margin-bottom: 3px; }
.hex-card.dim .hex-name { color: #b0b0cc; }
.hex-sub { font-size: 11px; color: #6870a0; }
.change-badge {
  display: inline-block; margin-top: 6px;
  background: rgba(200,169,110,0.12); border: 1px solid rgba(200,169,110,0.35);
  color: #c8a96e; border-radius: 6px; padding: 2px 8px; font-size: 11px;
}

.divider { color: #4a4a70; font-size: 12px; letter-spacing: 2px; text-align: center; }

.card-desc { border-top: 1px solid #1e2540; padding-top: 12px; }
.hex-card.dim .card-desc { border-top-color: #222240; }
.desc-kw { color: #c8a96e; font-size: 11px; margin-bottom: 5px; }
.hex-card.dim .desc-kw { color: #907898; }
.desc-summary { color: #9098b8; font-size: 12px; line-height: 1.9; }
.hex-card.dim .desc-summary { color: #7878a0; }

.yao-section { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
.yao-header { color: #5a5a88; font-size: 10px; letter-spacing: 2px; margin-bottom: 2px; }
.yao-item { border-left: 2px solid #1e1e38; padding-left: 10px; }
.yao-item.active {
  background: rgba(200,169,110,0.08); border-left-color: #c8a96e;
  border-radius: 4px; padding: 6px 10px;
}
.yao-ci { font-size: 10px; color: #5a5a88; margin-bottom: 2px; }
.yao-item.active .yao-ci { color: #c8a96e; }
.yao-bai { font-size: 12px; color: #3a3a58; line-height: 1.7; }
.yao-item.active .yao-bai { color: #9098b8; }

.dim-yao .yao-item { border-left-color: #2a2a50; }
.dim-yao .yao-ci { color: #6060a0; }
.dim-yao .yao-bai { color: #6060a0; }
</style>
</head>
<body>

<div class="header">
  <div class="sub">六十四卦</div>
  <h1>測字起卦</h1>
  <div class="yao">☰ ☱ ☲ ☳ ☴ ☵ ☶ ☷</div>
  <div class="teacher">王思迅老師測字法</div>
</div>

<div class="container">
  <span class="label">① 康熙字典筆畫</span>
  <div class="stroke-row">
    <input type="number" id="strokeInput" inputmode="numeric" placeholder="輸入筆畫數，例：19" oninput="onStrokeInput()">
    <div class="preview-box" id="previewBox" style="display:none">
      <div class="preview-gua" id="previewGua"></div>
      <div class="preview-label">上卦</div>
    </div>
  </div>

  <span class="label">② 時辰</span>
  <div class="shichen-grid" id="shichenGrid"></div>

  <div class="error" id="errorMsg" style="display:none"></div>

  <button class="calc-btn" onclick="calculate()">起　卦</button>

  <div class="result" id="result" style="display:none"></div>
</div>

<script>
// 先天八卦序：乾1 兌2 離3 震4 巽5 坎6 艮7 坤8
// lines[0]=初爻(最下), lines[1]=二爻, lines[2]=三爻(最上), 陽=1 陰=0
const BAGUA = [
  {id:1,name:"乾",lines:[1,1,1],element:"天"},
  {id:2,name:"兌",lines:[1,1,0],element:"澤"},
  {id:3,name:"離",lines:[1,0,1],element:"火"},
  {id:4,name:"震",lines:[1,0,0],element:"雷"},
  {id:5,name:"巽",lines:[0,1,1],element:"風"},
  {id:6,name:"坎",lines:[0,1,0],element:"水"},
  {id:7,name:"艮",lines:[0,0,1],element:"山"},
  {id:8,name:"坤",lines:[0,0,0],element:"地"},
];

const SHICHEN = [
  {id:1,zhi:"子",range:"23–01"},{id:2,zhi:"丑",range:"01–03"},
  {id:3,zhi:"寅",range:"03–05"},{id:4,zhi:"卯",range:"05–07"},
  {id:5,zhi:"辰",range:"07–09"},{id:6,zhi:"巳",range:"09–11"},
  {id:7,zhi:"午",range:"11–13"},{id:8,zhi:"未",range:"13–15"},
  {id:9,zhi:"申",range:"15–17"},{id:10,zhi:"酉",range:"17–19"},
  {id:11,zhi:"戌",range:"19–21"},{id:12,zhi:"亥",range:"21–23"},
];

// HEX_MAP["上卦id,下卦id"] = 卦名  (上卦=外卦=卦名前半, 下卦=內卦=卦名後半)
const HEX_MAP = {
  "1,1":"乾為天",  "1,2":"天澤履",  "1,3":"天火同人","1,4":"天雷無妄",
  "1,5":"天風姤",  "1,6":"天水訟",  "1,7":"天山遯",  "1,8":"天地否",
  "2,1":"澤天夬",  "2,2":"兌為澤",  "2,3":"澤火革",  "2,4":"澤雷隨",
  "2,5":"澤風大過","2,6":"澤水困",  "2,7":"澤山咸",  "2,8":"澤地萃",
  "3,1":"火天大有","3,2":"火澤睽",  "3,3":"離為火",  "3,4":"火雷噬嗑",
  "3,5":"火風鼎",  "3,6":"火水未濟","3,7":"火山旅",  "3,8":"火地晉",
  "4,1":"雷天大壯","4,2":"雷澤歸妹","4,3":"雷火豐",  "4,4":"震為雷",
  "4,5":"雷風恆",  "4,6":"雷水解",  "4,7":"雷山小過","4,8":"雷地豫",
  "5,1":"風天小畜","5,2":"風澤中孚","5,3":"風火家人","5,4":"風雷益",
  "5,5":"巽為風",  "5,6":"風水渙",  "5,7":"風山漸",  "5,8":"風地觀",
  "6,1":"水天需",  "6,2":"水澤節",  "6,3":"水火既濟","6,4":"水雷屯",
  "6,5":"水風井",  "6,6":"坎為水",  "6,7":"水山蹇",  "6,8":"水地比",
  "7,1":"山天大畜","7,2":"山澤損",  "7,3":"山火賁",  "7,4":"山雷頤",
  "7,5":"山風蠱",  "7,6":"山水蒙",  "7,7":"艮為山",  "7,8":"山地剝",
  "8,1":"地天泰",  "8,2":"地澤臨",  "8,3":"地火明夷","8,4":"地雷復",
  "8,5":"地風升",  "8,6":"地水師",  "8,7":"地山謙",  "8,8":"坤為地",
};

const DESC = {
"乾為天":{kw:"剛健、進取、創造",s:"天行健，君子以自強不息。諸事積極進行，有開創之勢，宜主動出擊，但須防過剛則折。",yao:[
  {ci:"潛龍勿用",bai:"時機未到，宜蓄積實力，不宜輕舉妄動。"},
  {ci:"見龍在田，利見大人",bai:"才華初露，積極與貴人建立關係，時機漸熟。"},
  {ci:"君子終日乾乾，夕惕若厲，無咎",bai:"全力以赴又謹慎自省，雖辛苦但不會出錯。"},
  {ci:"或躍在淵，無咎",bai:"正在評估是否要大步躍進，謹慎選擇皆可無礙。"},
  {ci:"飛龍在天，利見大人",bai:"運勢巔峰，適合與重要人物合作，大事可成。"},
  {ci:"亢龍有悔",bai:"已達頂點，繼續強進反而有悔，宜適可而止。"},
]},
"坤為地":{kw:"柔順、厚德、包容",s:"地勢坤，君子以厚德載物。宜以柔克剛，守正持中，配合協作則大吉。",yao:[
  {ci:"履霜，堅冰至",bai:"已有警訊出現，若不注意，困難將逐漸積累。"},
  {ci:"直、方、大，不習無不利",bai:"以正直踏實的態度行事，不需刻意鑽營自然順利。"},
  {ci:"含章可貞，或從王事，無成有終",bai:"低調內斂配合他人，雖無個人名聲但有圓滿結果。"},
  {ci:"括囊，無咎無譽",bai:"收斂言行、謹守本分，雖無光彩但也不會惹禍。"},
  {ci:"黃裳，元吉",bai:"謙遜處中位，以溫和守禮之姿大獲吉祥。"},
  {ci:"龍戰于野，其血玄黃",bai:"陰陽相爭激烈，強行對抗兩敗俱傷，宜退讓求和。"},
]},
"水雷屯":{kw:"初創、艱難、蓄積",s:"萬物初生，艱難險阻。根基正在奠定，宜耐心積累，不可躁進。",yao:[
  {ci:"磐桓，利居貞，利建侯",bai:"起步艱難，宜穩住陣腳，找到可靠夥伴共同推進。"},
  {ci:"屯如邅如，乘馬班如，匪寇婚媾",bai:"困境中遇到阻力，但對方是來幫助的，宜開放接納。"},
  {ci:"即鹿無虞，惟入于林中，君子幾不如舍",bai:"沒有嚮導就貿然追逐，只會迷路，不如暫時放棄。"},
  {ci:"乘馬班如，求婚媾，往吉，無不利",bai:"主動尋求合作與聯盟，前往必有好結果。"},
  {ci:"屯其膏，小貞吉，大貞凶",bai:"資源受阻，小事可行，切勿貿然推動大計畫。"},
  {ci:"乘馬班如，泣血漣如",bai:"困境已到極點，進退兩難，此時需靜待外援。"},
]},
"山水蒙":{kw:"蒙昧、學習、啟發",s:"山下有泉，發蒙之象。宜虛心求教，認清方向，學習成長後自有出路。",yao:[
  {ci:"發蒙，利用刑人，用說桎梏",bai:"剛開始學習需要明確規範，去除舊習才能開竅。"},
  {ci:"包蒙吉，納婦吉，子克家",bai:"包容蒙昧者並加以引導，家業與事業皆可順利。"},
  {ci:"勿用取女，見金夫，不有躬",bai:"不宜輕易被眼前利益誘惑，易失去自主判斷。"},
  {ci:"困蒙，吝",bai:"固守無知、拒絕學習，將陷入困境。"},
  {ci:"童蒙，吉",bai:"保持初學者謙虛開放的心態，反而大吉。"},
  {ci:"擊蒙，不利為寇，利禦寇",bai:"嚴格規範是為了防止偏差，不是為了壓制，宜正向引導。"},
]},
"水天需":{kw:"等待、時機、滋養",s:"雲上於天，須等待時機。事情尚未成熟，宜靜待時機，養精蓄銳，時機至則一舉成功。",yao:[
  {ci:"需于郊，利用恆，無咎",bai:"在外圍耐心等待，保持恆心，不會有問題。"},
  {ci:"需于沙，小有言，終吉",bai:"等待中有些小摩擦，但只要堅持最終仍吉。"},
  {ci:"需于泥，致寇至",bai:"太過冒進陷入困境，容易招來麻煩。"},
  {ci:"需于血，出自穴",bai:"身處危險之中，但只要沉著應對，終能脫身。"},
  {ci:"需于酒食，貞吉",bai:"安然等待中自得其樂，守正則吉。"},
  {ci:"入于穴，有不速之客三人來，敬之終吉",bai:"意外有人主動前來助你，以禮相待則轉危為安。"},
]},
"天水訟":{kw:"爭訟、衝突、謹慎",s:"天水違行，爭訟之象。宜避免爭執，退讓求和為上，若堅持到底恐有凶險。",yao:[
  {ci:"不永所事，小有言，終吉",bai:"不要把糾紛擴大，小爭執忍一忍，最終沒事。"},
  {ci:"不克訟，歸而逋，其邑人三百戶，無眚",bai:"爭不過就退讓，帶著家人安靜過日子，可避禍。"},
  {ci:"食舊德，貞厲，終吉",bai:"守住原有的成果與德行，雖有危機但最終吉。"},
  {ci:"不克訟，復即命，渝安貞吉",bai:"放棄爭訟、回歸正道，改變立場後反而平安。"},
  {ci:"訟，元吉",bai:"此爻居中得正，處理爭端大吉，可以據理力爭。"},
  {ci:"或錫之鞶帶，終朝三褫之",bai:"靠爭訟得來的榮耀很快就會失去，不值得。"},
]},
"地水師":{kw:"統帥、紀律、謀略",s:"地中有水，整軍之象。需有明確領導，合力則事可成。",yao:[
  {ci:"師出以律，否臧凶",bai:"出師必須紀律嚴明，紀律不整則必敗。"},
  {ci:"在師中，吉，無咎，王三錫命",bai:"領導者居中指揮，得眾人信任，屢獲賞識。"},
  {ci:"師或輿尸，凶",bai:"讓不適任的人掌兵，必然失敗。"},
  {ci:"師左次，無咎",bai:"暫時退守，等待更好時機，無過失。"},
  {ci:"田有禽，利執言，無咎，長子帥師",bai:"時機成熟出擊，讓有能力的人帶隊則吉。"},
  {ci:"大君有命，開國承家，小人勿用",bai:"論功行賞時，切勿讓小人得勢，否則前功盡棄。"},
]},
"水地比":{kw:"親比、聯盟、親和",s:"地上有水，親密相輔。宜結盟合作，建立信任關係，得人和則諸事順遂。",yao:[
  {ci:"有孚比之，無咎",bai:"以誠信與人相交，自然沒有問題。"},
  {ci:"比之自內，貞吉",bai:"從內心真誠地親近，守正則吉。"},
  {ci:"比之匪人",bai:"與錯誤的人結交，最終只會帶來傷害。"},
  {ci:"外比之，貞吉",bai:"與外部力量合作，守正則吉。"},
  {ci:"顯比，王用三驅，失前禽，邑人不誡，吉",bai:"光明正大地結盟，不強求，讓人自願歸附，大吉。"},
  {ci:"比之無首，凶",bai:"沒有主心骨的聯盟，終將瓦解，凶。"},
]},
"風天小畜":{kw:"積蓄、小成、柔道",s:"風行天上，積蓄待發。目前力量尚小，宜以柔道積蓄能量，小有成就，徐圖大業。",yao:[
  {ci:"復自道，何其咎，吉",bai:"回到正確的道路，有什麼過失呢，吉。"},
  {ci:"牽復，吉",bai:"被人拉回正道，也是吉。"},
  {ci:"輿說輻，夫妻反目",bai:"勉強前進反而造成內部失和，宜先解決內部矛盾。"},
  {ci:"有孚，血去惕出，無咎",bai:"以誠信化解危機，消除恐懼，無過失。"},
  {ci:"有孚攣如，富以其鄰",bai:"以誠信凝聚眾人，分享財富給周遭，大吉。"},
  {ci:"既雨既處，尚德載，婦貞厲",bai:"目標已達成，此時宜收斂守成，不可繼續躁進。"},
]},
"天澤履":{kw:"禮節、謹慎、步步為營",s:"踩虎尾而不被咬，只要態度謹慎有禮，即便面對強大壓力也可化險為夷。",yao:[
  {ci:"素履，往無咎",bai:"以質樸純真的態度前行，不會有問題。"},
  {ci:"履道坦坦，幽人貞吉",bai:"走在平坦正道上，低調自持的人守正則吉。"},
  {ci:"眇能視，跛能履，履虎尾，咥人，凶",bai:"力不足卻逞強，踩到老虎尾巴被咬，凶。"},
  {ci:"履虎尾，愬愬終吉",bai:"雖處危境，戰戰兢兢謹慎行事，最終吉。"},
  {ci:"夬履，貞厲",bai:"果斷前行雖正確，但仍有危機，不可大意。"},
  {ci:"視履考祥，其旋元吉",bai:"回顧自己走過的路，若行得正，則大吉。"},
]},
"地天泰":{kw:"通泰、安順、交融",s:"天地交泰，萬物通暢。現為吉祥之期，諸事順利，宜積極把握，天地人和。",yao:[
  {ci:"拔茅茹，以其彙，征吉",bai:"同心協力，拔草連根而起，一起前進大吉。"},
  {ci:"包荒，用馮河，不遐遺，朋亡，得尚于中行",bai:"有包容之心，敢於冒險，不拋棄任何人，守中道得賞識。"},
  {ci:"無平不陂，無往不復，艱貞無咎",bai:"沒有永遠的平坦，居安思危，堅守正道則無咎。"},
  {ci:"翩翩不富，以其鄰，不戒以孚",bai:"不獨享財富，與鄰分享，以誠信凝聚人心。"},
  {ci:"帝乙歸妹，以祉元吉",bai:"貴人相助，以謙遜之姿接受祝福，大吉。"},
  {ci:"城復于隍，勿用師，自邑告命，貞吝",bai:"盛極而衰，護城河已乾，不宜出征，守住本分為要。"},
]},
"天地否":{kw:"阻塞、閉塞、退守",s:"天地不交，萬物不通。現處困境，宜守靜待變，不宜冒進，等待否極泰來。",yao:[
  {ci:"拔茅茹，以其彙，貞吉，亨",bai:"與同道者一起退守，守正則有出路。"},
  {ci:"包承，小人吉，大人否亨",bai:"小人逢迎上位，君子則應保持距離，反能亨通。"},
  {ci:"包羞",bai:"包藏羞恥之事，此時應自我反省，不可放任。"},
  {ci:"有命無咎，疇離祉",bai:"順應天命，無過失，與志同道合者共享福祉。"},
  {ci:"休否，大人吉；其亡其亡，繫于苞桑",bai:"阻塞將止，大人吉；但仍要有危機意識，方能穩固。"},
  {ci:"傾否，先否後喜",bai:"否極泰來，一開始困難，最後帶來喜悅。"},
]},
"天火同人":{kw:"同心、合作、大同",s:"天火相伴，眾志成城。宜廣結善緣，同心協力，開誠布公則大事可成。",yao:[
  {ci:"同人于門，無咎",bai:"在家門口廣結同道，開放心胸，無過失。"},
  {ci:"同人于宗，吝",bai:"只與親近小圈子同氣，格局太小，有遺憾。"},
  {ci:"伏戎于莽，升其高陵，三歲不興",bai:"暗中設伏、心懷疑慮，三年內都難有成就。"},
  {ci:"乘其墉，弗克攻，吉",bai:"登高窺視卻無法攻下，反而因此清醒，吉。"},
  {ci:"同人先號咷而後笑，大師克相遇",bai:"先有衝突與哭泣，但最終大家相遇和好，大吉。"},
  {ci:"同人于郊，無悔",bai:"在廣闊之地與人和諧相處，雖無大功，但無悔。"},
]},
"火天大有":{kw:"豐盛、光明、盛大",s:"火在天上，光照萬物。現為豐盛之時，事業輝煌，宜謙遜處世，防驕生禍。",yao:[
  {ci:"無交害，匪咎，艱則無咎",bai:"尚未與外界深度往來，只要謹慎行事就沒問題。"},
  {ci:"大車以載，有攸往，無咎",bai:"有足夠的承載力，積極前進，無過失。"},
  {ci:"公用亨于天子，小人弗克",bai:"賢者可以奉獻給更高目標，小人則無此格局。"},
  {ci:"匪其彭，無咎",bai:"不炫耀豐盛，保持低調謙遜，無過失。"},
  {ci:"厥孚交如，威如，吉",bai:"以誠信交往，又保持應有的威儀，吉。"},
  {ci:"自天祐之，吉無不利",bai:"上天庇佑，所向皆吉，天時地利人和俱備。"},
]},
"地山謙":{kw:"謙遜、內斂、平衡",s:"地中有山，謙遜之象。以謙虛態度待人接物，自能得眾人擁護，謙遜是最大的力量。",yao:[
  {ci:"謙謙君子，用涉大川，吉",bai:"真正謙遜的人，即使面對大風浪也能平安渡過。"},
  {ci:"鳴謙，貞吉",bai:"謙遜之名遠播，守正則吉。"},
  {ci:"勞謙，君子有終，吉",bai:"辛勤付出又保持謙遜，必有善終，吉。"},
  {ci:"無不利，撝謙",bai:"發揮謙遜之德，所做之事無不有利。"},
  {ci:"不富以其鄰，利用侵伐，無不利",bai:"不以富貴傲人，必要時果斷行動，無不有利。"},
  {ci:"鳴謙，利用行師，征邑國",bai:"謙遜之名傳播，可以採取積極行動，征伐不服者。"},
]},
"雷地豫":{kw:"豫樂、預備、和諧",s:"雷出地奮，歡豫之象。當前形勢有利，宜鼓舞士氣，提前做好準備。",yao:[
  {ci:"鳴豫，凶",bai:"大聲宣揚自己的快樂，驕傲自滿，必招凶禍。"},
  {ci:"介于石，不終日，貞吉",bai:"心志堅定如磐石，能在一天內做出正確判斷，吉。"},
  {ci:"盱豫悔，遲有悔",bai:"諂媚取悅而後悔，行動遲緩也後悔，宜果斷自持。"},
  {ci:"由豫，大有得，勿疑，朋盍簪",bai:"以豫卦精神引導眾人，大有收穫，朋友聚集響應。"},
  {ci:"貞疾，恆不死",bai:"長期處於不健康狀態，但只要守正，仍不至於敗亡。"},
  {ci:"冥豫，成有渝，無咎",bai:"沉迷於享樂，但若能及時改變，還不至於有大問題。"},
]},
"澤雷隨":{kw:"順應、跟隨、靈活",s:"澤中有雷，隨機應變。宜順應時勢，靈活調整策略，跟隨對的方向則吉。",yao:[
  {ci:"官有渝，貞吉，出門交有功",bai:"改變做法，守正則吉，主動出去與人交流有所成。"},
  {ci:"係小子，失丈夫",bai:"跟隨小人，就會失去真正的賢者，選擇很重要。"},
  {ci:"係丈夫，失小子，隨有求得，利居貞",bai:"跟隨賢者，雖失去小利，但長遠來看有所求皆得。"},
  {ci:"隨有獲，貞凶，有孚在道，以明何咎",bai:"雖有所獲，但若只貪眼前守正反凶；以誠信走正道才無咎。"},
  {ci:"孚于嘉，吉",bai:"誠信地跟隨美好的事物，吉。"},
  {ci:"拘係之，乃從維之，王用亨于西山",bai:"強力凝聚人心，最終得以完成重大使命。"},
]},
"山風蠱":{kw:"整治、改革、振興",s:"山下有風，積弊待治。宜積極改革，振衰起敝，大力革新。",yao:[
  {ci:"幹父之蠱，有子考，無咎，厲終吉",bai:"承擔父業的積弊加以整治，雖辛苦最終吉。"},
  {ci:"幹母之蠱，不可貞",bai:"整治母親遺留的問題，需要柔和的方式，不可太強硬。"},
  {ci:"幹父之蠱，小有悔，無大咎",bai:"整治積弊稍有遺憾，但大體上無大問題。"},
  {ci:"裕父之蠱，往見吝",bai:"對積弊太過寬容放任，繼續下去會有遺憾。"},
  {ci:"幹父之蠱，用譽",bai:"積極整治積弊，贏得美譽。"},
  {ci:"不事王侯，高尚其事",bai:"不追名逐利，以更高的志節自持，令人敬仰。"},
]},
"地澤臨":{kw:"臨近、親臨、進展",s:"澤上有地，大人臨下。宜親力親為，以誠心感化，把握時機推進。",yao:[
  {ci:"咸臨，貞吉",bai:"以真誠感應之心臨近眾人，守正則吉。"},
  {ci:"咸臨，吉，無不利",bai:"以感應之心親臨，吉，所做之事無不有利。"},
  {ci:"甘臨，無攸利，既憂之，無咎",bai:"只靠甜言蜜語沒有好處，若能反思憂慮，則無咎。"},
  {ci:"至臨，無咎",bai:"以最高誠意親臨，無過失。"},
  {ci:"知臨，大君之宜，吉",bai:"以智慧臨人，這是大人物應有的態度，吉。"},
  {ci:"敦臨，吉，無咎",bai:"以敦厚誠實之心待人，吉，無過失。"},
]},
"風地觀":{kw:"觀察、審視、示範",s:"風行地上，觀風察勢。宜廣泛觀察，深思熟慮，以身作則，示範帶動他人。",yao:[
  {ci:"童觀，小人無咎，君子吝",bai:"以孩童淺薄的眼光看事，小人無妨，君子則有失格。"},
  {ci:"闚觀，利女貞",bai:"從縫隙窺視，視野受限，適合柔守，不宜大動作。"},
  {ci:"觀我生，進退",bai:"觀察自身的行為，決定是否前進或退守。"},
  {ci:"觀國之光，利用賓于王",bai:"觀察大局、看清時代風向，適合為上位者效力。"},
  {ci:"觀我生，君子無咎",bai:"深刻觀察自己的行為，君子如此則無過失。"},
  {ci:"觀其生，君子無咎",bai:"觀察他人的行為與自身的影響，君子如此則無咎。"},
]},
"火雷噬嗑":{kw:"決斷、克服阻礙、執法",s:"雷電相合，噬嗑之象。有障礙需克服，宜果斷決策，剷除阻礙，公正執行。",yao:[
  {ci:"屨校滅趾，無咎",bai:"輕微的懲戒使人收斂，防患於未然，無大礙。"},
  {ci:"噬膚滅鼻，無咎",bai:"處理問題雖有些過激，但出發點是好的，無大過。"},
  {ci:"噬臘肉，遇毒，小吝，無咎",bai:"遇到難啃的問題，稍有麻煩，但仍可克服。"},
  {ci:"噬乾胏，得金矢，利艱貞，吉",bai:"克服最強硬的阻礙，以公正態度堅持，終獲吉。"},
  {ci:"噬乾肉，得黃金，貞厲，無咎",bai:"克服困難得到成果，但仍需保持警戒心。"},
  {ci:"何校滅耳，凶",bai:"頑固不化，遭受最嚴厲的懲戒，凶。"},
]},
"山火賁":{kw:"修飾、文明、外表",s:"山下有火，文明之象。注重外在形象與禮儀，修飾得宜，可增添光彩。",yao:[
  {ci:"賁其趾，舍車而徒",bai:"修飾從腳步開始，寧願步行也要保持正直風骨。"},
  {ci:"賁其須",bai:"修飾得體，如鬚眉整齊，形象良好。"},
  {ci:"賁如濡如，永貞吉",bai:"文飾如沐春風般潤澤，長久守正則吉。"},
  {ci:"賁如皤如，白馬翰如，匪寇婚媾",bai:"看似被阻，實為良緣；白馬翩翩而來，非敵是友。"},
  {ci:"賁于丘園，束帛戔戔，吝，終吉",bai:"雖禮薄，但出於真心，最終仍有好結果。"},
  {ci:"白賁，無咎",bai:"去除過度修飾，以素白本真之態示人，最高境界。"},
]},
"山地剝":{kw:"剝落、衰退、慎守",s:"山附於地，剝落之象。處於衰退之期，宜靜守待時，勿輕舉妄動，等待轉機。",yao:[
  {ci:"剝床以足，蔑貞，凶",bai:"根基已被侵蝕，若再不守正，必有凶禍。"},
  {ci:"剝床以辨，蔑貞，凶",bai:"侵蝕已到床框，情況危急，切勿輕忽。"},
  {ci:"剝之，無咎",bai:"雖在剝落之中，但此爻與上位相應，可以無咎。"},
  {ci:"剝床以膚，凶",bai:"剝落已傷及自身，凶，需要緊急應對。"},
  {ci:"貫魚，以宮人寵，無不利",bai:"如魚串連，以順從之道待上位，無不有利。"},
  {ci:"碩果不食，君子得輿，小人剝廬",bai:"保留最後的果實不食，君子得到承載，小人卻自毀家園。"},
]},
"地雷復":{kw:"回復、轉機、再生",s:"雷在地中，一陽來復。否極泰來，事情正在好轉，宜順勢而為，把握復甦時機。",yao:[
  {ci:"不遠復，無祗悔，元吉",bai:"迷途知返，錯誤尚淺就回頭，大吉。"},
  {ci:"休復，吉",bai:"效法他人回歸正道，吉。"},
  {ci:"頻復，厲無咎",bai:"屢次反覆，雖有危機，但只要真心悔改仍無大咎。"},
  {ci:"中行獨復",bai:"在眾人皆迷失時，獨自堅守正道而回頭，難得。"},
  {ci:"敦復，無悔",bai:"以敦厚之心回歸正道，沒有遺憾。"},
  {ci:"迷復，凶，有災眚",bai:"執迷不悟，不肯回頭，必有凶禍與災難。"},
]},
"天雷無妄":{kw:"真誠、無私、自然",s:"天下有雷，無妄之災。行事要真誠自然，不可有非分之想，順天應人則吉。",yao:[
  {ci:"無妄，往吉",bai:"以純真無邪的心前進，吉。"},
  {ci:"不耕獲，不菑畬，則利有攸往",bai:"不計回報地耕耘，自然有所收穫，前進有利。"},
  {ci:"無妄之災，或繫之牛，行人之得，邑人之災",bai:"無端遭受橫禍，好事反被人占便宜，需謹慎防範。"},
  {ci:"可貞，無咎",bai:"可以守正，無過失。"},
  {ci:"無妄之疾，勿藥有喜",bai:"無端生病，不必急著用藥，順其自然反而會好。"},
  {ci:"無妄，行有眚，無攸利",bai:"時機不對強行前進，有災禍，此時靜守為宜。"},
]},
"山天大畜":{kw:"蓄積、涵養、大成",s:"天在山中，大量蓄積。厚積薄發，廣納賢才，蓄積力量待時機成熟，可成大事。",yao:[
  {ci:"有厲，利已",bai:"有危險，宜停止前進，蓄積力量待時。"},
  {ci:"輿說輹",bai:"車輪脫落，被迫停下，這是在蓄積力量的時候。"},
  {ci:"良馬逐，利艱貞，曰閑輿衛，利有攸往",bai:"如良馬奔馳，但需艱貞守正，練好本領再出發。"},
  {ci:"童牛之牿，元吉",bai:"在問題還小的時候就加以管控，大吉。"},
  {ci:"豶豕之牙，吉",bai:"閹豬以去其猛，控制衝動之力，轉化為建設之用，吉。"},
  {ci:"何天之衢，亨",bai:"大道通暢無阻，可以自由前行，亨通。"},
]},
"山雷頤":{kw:"養育、節制、口慎",s:"山下有雷，頤養之象。注意飲食起居，慎言慎行，以正道養身養心。",yao:[
  {ci:"舍爾靈龜，觀我朵頤，凶",bai:"放棄自身的靈性與能力，羨慕他人的口腹之慾，凶。"},
  {ci:"顛頤，拂經，于丘頤，征凶",bai:"顛倒養道，違背常理求養，前進必凶。"},
  {ci:"拂頤，貞凶，十年勿用",bai:"違背養道，守正也凶，十年內不宜有大行動。"},
  {ci:"顛頤，吉，虎視眈眈，其欲逐逐，無咎",bai:"雖是顛倒求養，但虎視眈眈持續努力，無咎。"},
  {ci:"拂經，居貞吉，不可涉大川",bai:"違背常規但守正可吉，但不宜冒險渡大川。"},
  {ci:"由頤，厲吉，利涉大川",bai:"眾人依賴你的養育，雖有危機仍吉，可涉大川。"},
]},
"澤風大過":{kw:"過度、超常、非常",s:"澤滅木，大過之象。處於非常時期，需非常之策，棟梁若能撐住，可轉危為安。",yao:[
  {ci:"藉用白茅，無咎",bai:"以謹慎的方式處理，雖過度但無咎。"},
  {ci:"枯楊生稊，老夫得其女妻，無不利",bai:"枯木重生，老夫娶少妻，逆勢復甦，無不有利。"},
  {ci:"棟橈，凶",bai:"棟梁彎曲將折，局面岌岌可危，凶。"},
  {ci:"棟隆，吉，有它吝",bai:"棟梁隆起堅固，吉，但若過猶不及仍有遺憾。"},
  {ci:"枯楊生華，老婦得其士夫，無咎無譽",bai:"雖有回春之象，但不合時宜，無過失也無榮耀。"},
  {ci:"過涉滅頂，凶，無咎",bai:"涉水過深以至滅頂，雖凶但出於義，無個人過失。"},
]},
"坎為水":{kw:"險難、習坎、誠信",s:"水流不息，習坎之象。雖處險境，以誠信貫中，習於艱難則終可脫困。",yao:[
  {ci:"習坎，入于坎窞，凶",bai:"反覆陷入危險深處，無法脫身，凶。"},
  {ci:"坎有險，求小得",bai:"雖有危險，但可以在小事上有所收穫，宜小步前進。"},
  {ci:"來之坎坎，險且枕，入于坎窞，勿用",bai:"危險重重，進退皆是深淵，此時靜守不動為宜。"},
  {ci:"樽酒簋貳，用缶，納約自牖，終無咎",bai:"以真誠簡樸之禮相待，從窗口進入，最終無咎。"},
  {ci:"坎不盈，祗既平，無咎",bai:"險難尚未填滿，但已趨於平穩，無大過失。"},
  {ci:"係用徽纆，寘于叢棘，三歲不得，凶",bai:"被困束縛，三年無法脫身，凶。"},
]},
"離為火":{kw:"光明、依附、文明",s:"兩火相麗，光明之象。宜依附正道，發揮才華，以光明磊落態度行事則吉。",yao:[
  {ci:"履錯然，敬之，無咎",bai:"起步時步伐凌亂，但保持敬慎之心，無過失。"},
  {ci:"黃離，元吉",bai:"以中庸之道附麗，黃色居中，大吉。"},
  {ci:"日昃之離，不鼓缶而歌，則大耋之嗟，凶",bai:"日薄西山，應珍惜時光，若不知警惕，老來徒嗟。"},
  {ci:"突如其來如，焚如，死如，棄如",bai:"驟然而來的光芒太過猛烈，反而招致焚毀與棄絕。"},
  {ci:"出涕沱若，戚嗟若，吉",bai:"以悲憫之心感受萬物，痛哭流涕後，反能獲吉。"},
  {ci:"王用出征，有嘉折首，獲匪其醜，無咎",bai:"以正義出征，只斬首惡，不株連無辜，無過失。"},
]},
"澤山咸":{kw:"感應、交流、吸引",s:"山上有澤，感應之象。宜以誠心感化，建立情感連結，萬物相感則生機無限。",yao:[
  {ci:"咸其拇",bai:"感應只在腳趾，尚淺，還不到行動的時候。"},
  {ci:"咸其腓，凶，居吉",bai:"感應到小腿急於行動，凶；靜守待機，吉。"},
  {ci:"咸其股，執其隨，往吝",bai:"感應到大腿，只跟隨別人而動，缺乏主見，有遺憾。"},
  {ci:"貞吉，悔亡，憧憧往來，朋從爾思",bai:"守正則吉，悔消；以真誠之心往來，朋友自然追隨。"},
  {ci:"咸其脢，無悔",bai:"感應到背部，雖不深刻，但也無悔。"},
  {ci:"咸其輔頰舌",bai:"只靠言語感人，流於表面，需更深刻的誠意。"},
]},
"雷風恆":{kw:"恆久、持續、穩固",s:"雷風相與，恆久之象。宜持之以恆，立定志向，堅持不懈方能成就大業。",yao:[
  {ci:"浚恆，貞凶，無攸利",bai:"一開始要求太深、太急，守正也凶，沒有好處。"},
  {ci:"悔亡",bai:"持守恆道，悔恨自然消失。"},
  {ci:"不恆其德，或承之羞，貞吝",bai:"德行不能恆久，偶爾有失，守正也有遺憾。"},
  {ci:"田無禽",bai:"打獵卻沒有獵物，方法不對，努力也是白費。"},
  {ci:"恆其德，貞，婦人吉，夫子凶",bai:"以柔順恆持為吉，女性適用；男性若如此則失去進取，凶。"},
  {ci:"振恆，凶",bai:"恆道之末端，躁動不安，凶。"},
]},
"天山遯":{kw:"退避、隱退、保存",s:"天下有山，退避之象。時機不利，宜暫時退讓保存實力，韜光養晦以待時機。",yao:[
  {ci:"遯尾，厲，勿用有攸往",bai:"退避的最後一個，危險，此時不宜有任何行動。"},
  {ci:"執之用黃牛之革，莫之勝說",bai:"被強力束縛，難以脫身，但可藉此時機充實自己。"},
  {ci:"係遯，有疾厲，畜臣妾，吉",bai:"退避受阻，有危機；但可在小範圍內蓄養人才，吉。"},
  {ci:"好遯，君子吉，小人否",bai:"善於退避的君子大吉，小人做不到。"},
  {ci:"嘉遯，貞吉",bai:"美好的退避，守正則吉。"},
  {ci:"肥遯，無不利",bai:"從容自在地退避，沒有牽絆，無不有利。"},
]},
"雷天大壯":{kw:"壯大、陽剛、進取",s:"雷在天上，大壯之象。陽氣旺盛，宜大膽進取，但須以禮約束，防因魯莽而失。",yao:[
  {ci:"壯于趾，征凶，有孚",bai:"只靠腳力猛進，征伐必凶，但誠信尚在。"},
  {ci:"貞吉",bai:"守正則吉，剛強而有節制。"},
  {ci:"小人用壯，君子用罔，貞厲，羝羊觸藩，羸其角",bai:"小人逞強，君子知退；強行硬闖如羊角卡籬笆，進退兩難。"},
  {ci:"貞吉，悔亡，藩決不羸，壯于大輿之輹",bai:"守正吉，悔消；籬笆開了，可以大步前進了。"},
  {ci:"喪羊于易，無悔",bai:"在平易之地失去羊，雖有損失但無大悔。"},
  {ci:"羝羊觸藩，不能退，不能遂，無攸利，艱則吉",bai:"進退兩難，強行無益；靜守艱難中等待時機，反而吉。"},
]},
"火地晉":{kw:"晉升、進步、光明",s:"日出地上，晉升之象。諸事順利進展，宜積極進取，展現才能，光明前程在望。",yao:[
  {ci:"晉如摧如，貞吉，罔孚，裕無咎",bai:"前進中有阻礙，守正吉，即使未被信任，寬容待之無咎。"},
  {ci:"晉如愁如，貞吉，受茲介福，于其王母",bai:"憂愁中前進，守正吉，將從長輩處獲得大福。"},
  {ci:"眾允，悔亡",bai:"得到眾人信任，悔恨消失。"},
  {ci:"晉如鼫鼠，貞厲",bai:"像碩鼠一樣貪進，守正也有危機，宜收斂。"},
  {ci:"悔亡，失得勿恤，往吉，無不利",bai:"悔消，不要計較得失，前往必吉。"},
  {ci:"晉其角，維用伐邑，厲吉，無咎，貞吝",bai:"進到頂端，用於內部整頓，雖有危機仍吉，但持守有遺憾。"},
]},
"地火明夷":{kw:"隱忍、韜光、保護",s:"日入地中，光明受阻。宜韜光養晦，隱忍待機，保護自身，等待黑暗過去。",yao:[
  {ci:"明夷于飛，垂其翼，君子于行，三日不食",bai:"光明受傷而飛，垂下翅膀；君子出行，三天不食，忍耐中前行。"},
  {ci:"明夷，夷于左股，用拯馬壯，吉",bai:"雖受傷於左腿，但以強健的馬匹協助，吉。"},
  {ci:"明夷于南狩，得其大首，不可疾貞",bai:"在南方捕獵得到首惡，不可操之過急。"},
  {ci:"入于左腹，獲明夷之心，于出門庭",bai:"深入核心，了解黑暗的本質，然後從容離開。"},
  {ci:"箕子之明夷，利貞",bai:"如箕子般在黑暗中保持內心光明，守正有利。"},
  {ci:"不明晦，初登于天，後入于地",bai:"一開始輝煌，最終跌落；不明智的行為終將自食其果。"},
]},
"風火家人":{kw:"家庭、規範、內修",s:"風自火出，齊家之象。宜整頓秩序，各司其職，和睦相處則諸事可成。",yao:[
  {ci:"閑有家，悔亡",bai:"在家庭中建立規範，悔恨自然消失。"},
  {ci:"無攸遂，在中饋，貞吉",bai:"不貪圖外求，安心於家內職責，守正則吉。"},
  {ci:"家人嗃嗃，悔厲，吉；婦子嘻嘻，終吝",bai:"家規嚴格雖有悔，但終吉；若一味放縱嬉笑，終有遺憾。"},
  {ci:"富家，大吉",bai:"充實家庭，大吉。"},
  {ci:"王假有家，勿恤，吉",bai:"以王道治家，不必過慮，吉。"},
  {ci:"有孚威如，終吉",bai:"以誠信建立威嚴，最終大吉。"},
]},
"火澤睽":{kw:"乖違、對立、求同",s:"上火下澤，背離之象。目前有分歧和矛盾，宜求同存異，小事可行，大事宜謹慎。",yao:[
  {ci:"悔亡，喪馬勿逐，自復，見惡人，無咎",bai:"悔消，失去的不必強追，自然歸來；與難相處的人交流反能無咎。"},
  {ci:"遇主于巷，無咎",bai:"在意想不到的地方遇到有緣人，無過失。"},
  {ci:"見輿曳，其牛掣，其人天且劓，無初有終",bai:"起初困難重重，面目全非，但堅持到底終有好結果。"},
  {ci:"睽孤，遇元夫，交孚，厲無咎",bai:"孤獨中遇到真誠的人，相互信任，雖有危機無咎。"},
  {ci:"悔亡，厥宗噬膚，往何咎",bai:"悔消，族人合作克服阻礙，前進有何過失。"},
  {ci:"睽孤，見豕負塗，載鬼一車，先張之弧，後說之弧",bai:"孤疑中誤以為妖魔，後來發現是良友；猜疑化解，相合吉。"},
]},
"水山蹇":{kw:"蹇難、阻礙、求援",s:"山上有水，行走艱難。前路多阻，宜求助於人，或轉換方向，切勿強行硬闖。",yao:[
  {ci:"往蹇來譽",bai:"強行前往只會更艱難，退回來反而獲得讚譽。"},
  {ci:"王臣蹇蹇，匪躬之故",bai:"王臣面對重重困難，是為公義而非個人私利。"},
  {ci:"往蹇來反",bai:"前往更困難，不如回頭，以退為進。"},
  {ci:"往蹇來連",bai:"前往遇阻，退回可與眾人會合，共同克服困難。"},
  {ci:"大蹇朋來",bai:"大困難中，朋友們紛紛前來相助，共渡難關。"},
  {ci:"往蹇來碩，吉，利見大人",bai:"前往艱難，退回可有大成果；宜求助貴人，吉。"},
]},
"雷水解":{kw:"解除、舒緩、化解",s:"雷雨作解，萬物蘇生。困難正在化解，宜趁機果斷行動，寬容待人。",yao:[
  {ci:"無咎",bai:"困難解除，無過失，可以安然。"},
  {ci:"田獲三狐，得黃矢，貞吉",bai:"去除隱患，獲得公正之道，守正則吉。"},
  {ci:"負且乘，致寇至，貞吝",bai:"身份與行為不相符，反而招來麻煩，守正也有遺憾。"},
  {ci:"解而拇，朋至斯孚",bai:"解除不適任的合作關係，真正的朋友自然前來。"},
  {ci:"君子維有解，吉，有孚于小人",bai:"君子主動化解，吉，以誠信感化小人。"},
  {ci:"公用射隼于高墉之上，獲之，無不利",bai:"在高處精準射下隼鳥，時機精準出手，無不有利。"},
]},
"山澤損":{kw:"損減、犧牲、誠心",s:"山下有澤，損益之道。宜有所犧牲付出，以誠心補益，雖有損失但終有所得。",yao:[
  {ci:"已事遄往，無咎，酌損之",bai:"事情完成後迅速前往協助，無咎；但要斟酌損益的分寸。"},
  {ci:"利貞，征凶，弗損益之",bai:"守正有利，強行出征反凶；不損自身去益他，才是真益。"},
  {ci:"三人行，則損一人，一人行，則得其友",bai:"三人同行反而內耗，獨行反而能獲得真正的朋友。"},
  {ci:"損其疾，使遄有喜，無咎",bai:"減少自身的弱點，使喜事加速到來，無過失。"},
  {ci:"或益之十朋之龜，弗克違，元吉",bai:"意外獲得大福，無法推辭，大吉。"},
  {ci:"弗損益之，無咎，貞吉，利有攸往，得臣無家",bai:"不損己而益人，無咎，貞吉；廣得人才而無私藏。"},
]},
"風雷益":{kw:"增益、獲得、利他",s:"風雷交作，增益之象。現為有利時機，宜積極行動，利人利己，廣施善緣則大吉。",yao:[
  {ci:"利用為大作，元吉，無咎",bai:"此時適合推動大事，大吉，無過失。"},
  {ci:"或益之十朋之龜，弗克違，永貞吉",bai:"獲得意外大益，長守正道則吉。"},
  {ci:"益之用凶事，無咎，有孚中行，告公用圭",bai:"以誠信在逆境中求益，無咎，稟告上位者以示公正。"},
  {ci:"中行告公從，利用為依遷國",bai:"以中正之道得到上位認可，可以推動大變革。"},
  {ci:"有孚惠心，勿問元吉，有孚惠我德",bai:"以誠心施惠，不必疑問，大吉；真誠感化，德行回饋。"},
  {ci:"莫益之，或擊之，立心勿恆，凶",bai:"沒有人願意增益，甚至遭受攻擊；心志不堅則凶。"},
]},
"澤天夬":{kw:"決斷、去除、揚善",s:"澤上於天，決斷之象。宜果斷決策，剷除積弊，但需以正道行之。",yao:[
  {ci:"壯于前趾，往不勝，為咎",bai:"只靠腳下之勇冒進，無法勝任，反成過失。"},
  {ci:"惕號，莫夜有戎，勿恤",bai:"保持警戒並大聲呼號，即使夜間有兵來也不必憂慮。"},
  {ci:"壯于頄，有凶，君子夬夬，獨行遇雨，若濡，有慍，無咎",bai:"逞強於面部，有凶；君子獨行雖遭淋濕，無大咎。"},
  {ci:"臀無膚，其行次且，牽羊悔亡，聞言不信",bai:"坐立難安，行動遲疑，若能如牽羊般順勢，悔消。"},
  {ci:"莧陸夬夬，中行無咎",bai:"以中正之道果斷去除積弊，無過失。"},
  {ci:"無號，終有凶",bai:"大功告成後若大意鬆懈，最終仍有凶禍。"},
]},
"天風姤":{kw:"相遇、機緣、謹慎",s:"天下有風，遇合之象。有意外機緣，宜謹慎辨別，防止小人趁機而入。",yao:[
  {ci:"繫于金柅，貞吉，有攸往，見凶",bai:"以金屬車闸牢固剎住，守正吉；若放任前行，見凶。"},
  {ci:"包有魚，無咎，不利賓",bai:"包中有魚，能管住自己的部分，無咎；但不適合大張旗鼓。"},
  {ci:"臀無膚，其行次且，厲，無大咎",bai:"坐立難安，行動困難，雖有危機，但無大過失。"},
  {ci:"包無魚，起凶",bai:"失去掌控，如包中無魚，一旦起事便凶。"},
  {ci:"以杞包瓜，含章，有隕自天",bai:"以杞木保護甜瓜，以包容之道守護，善緣自天而降。"},
  {ci:"姤其角，吝，無咎",bai:"在最高處相遇，孤立無援，有遺憾，但無大咎。"},
]},
"澤地萃":{kw:"聚集、匯聚、群策",s:"澤上於地，萃聚之象。眾人聚集，宜整合力量，群策群力。",yao:[
  {ci:"有孚不終，乃亂乃萃，若號，一握為笑，勿恤，往無咎",bai:"誠信未堅持到底而混亂；呼號求助，雖被嘲笑，前往仍無咎。"},
  {ci:"引吉，無咎，孚乃利用禴",bai:"受人引領而聚，吉，無咎；以誠心行簡單祭祀即可。"},
  {ci:"萃如嗟如，無攸利，往無咎，小吝",bai:"聚集中有嗟嘆，無大利；但前往無咎，只是稍有遺憾。"},
  {ci:"大吉，無咎",bai:"大吉，無過失，聚合之勢正好。"},
  {ci:"萃有位，無咎，匪孚，元永貞，悔亡",bai:"居位聚合，無咎；即使未獲信任，長守正道，悔消。"},
  {ci:"齎咨涕洟，無咎",bai:"哀嘆流淚，但無過失，感慨之中仍能保持正道。"},
]},
"地風升":{kw:"上升、晉升、積累",s:"地中生木，上升之象。事業蒸蒸日上，宜踏實積累，循序漸進，自有晉升之機。",yao:[
  {ci:"允升，大吉",bai:"順勢上升，大吉。"},
  {ci:"孚乃利用禴，無咎",bai:"以誠心行簡樸之禮，無過失，真誠比排場重要。"},
  {ci:"升虛邑",bai:"上升進入空曠之地，暢行無阻。"},
  {ci:"王用亨于岐山，吉，無咎",bai:"在聖地祭祀，得到上天庇佑，吉，無咎。"},
  {ci:"貞吉，升階",bai:"守正則吉，一步一步踏實上升。"},
  {ci:"冥升，利于不息之貞",bai:"在黑暗中上升，利於持續不懈地守正。"},
]},
"澤水困":{kw:"困境、窮困、考驗",s:"澤中無水，困乏之象。雖處困境，君子守志不渝，以德自持，終能脫困見光明。",yao:[
  {ci:"臀困于株木，入于幽谷，三歲不覿",bai:"被荊棘所困，陷入幽暗，三年不見光明，處境艱難。"},
  {ci:"困于酒食，朱紱方來，利用享祀，征凶，無咎",bai:"困於飲食奢靡，貴人將至；此時宜誠心祭祀，不宜出征。"},
  {ci:"困于石，據于蒺藜，入于其宮，不見其妻，凶",bai:"前阻後刺，回家也找不到妻子，四面楚歌，凶。"},
  {ci:"來徐徐，困于金車，吝，有終",bai:"緩慢而來，被金車所困，有遺憾；但只要堅持終有結果。"},
  {ci:"劓刖，困于赤紱，乃徐有說，利用祭祀",bai:"遭受嚴厲刑罰，但慢慢得到解脫，宜以誠心祭祀感恩。"},
  {ci:"困于葛藟，于臲卼，曰動悔，有悔，征吉",bai:"被藤蔓所困，搖搖晃晃；動了悔意就行動，前往則吉。"},
]},
"水風井":{kw:"養育、資源、恆常",s:"木上有水，井養之象。資源豐富卻需善加利用，養人利物，恆常不變方為正道。",yao:[
  {ci:"井泥不食，舊井無禽",bai:"廢棄的井泥濘不堪，無人問津；積極更新自己，才不至廢棄。"},
  {ci:"井谷射鮒，甕敝漏",bai:"井水只夠養魚，水桶又破漏，才能未充分發揮，有遺憾。"},
  {ci:"井渫不食，為我心惻，可用汲，王明並受其福",bai:"井已清洗卻無人汲取，令人惋惜；若得明主賞識，共沐其福。"},
  {ci:"井甃，無咎",bai:"整修井壁，使之完善，無過失。"},
  {ci:"井冽，寒泉食",bai:"清澈甘冽的泉水，可供飲用，才能充分發揮，吉。"},

const LINE_NAMES = ["初爻","二爻","三爻","四爻","五爻","上爻"];
let selectedSc = null;

// ── 算法（已修正）────────────────────────────────────
function upperGua(s) { const r = s % 8; return r === 0 ? 8 : r; }
// 修正版：從上卦的下一個開始，數 eb 步
function lowerGua(uid, eb) { return (uid + eb - 1) % 8 + 1; }
function changingLine(s, eb) { const r = (s + eb) % 6; return r === 0 ? 6 : r; }
function hexName(u, l) { return HEX_MAP[u+","+l]; }

function applyChange(name, lineNum) {
  const entry = Object.entries(HEX_MAP).find(([k,v]) => v === name);
  if (!entry) return null;
  const [uid, lid] = entry[0].split(",").map(Number);
  const lower = BAGUA[lid-1];
  const upper = BAGUA[uid-1];
  // 六爻從下到上: [下卦初,下卦二,下卦三, 上卦四,上卦五,上卦六]
  // lineNum=1→index=0(初爻), lineNum=6→index=5(上爻)
  const lines = [...lower.lines, ...upper.lines];
  lines[lineNum-1] ^= 1;
  const newLower = BAGUA.find(g => g.lines.every((v,i) => v === lines[i]));
  const newUpper = BAGUA.find(g => g.lines.every((v,i) => v === lines[i+3]));
  if (newLower && newUpper) return HEX_MAP[newUpper.id+","+newLower.id];
  return null;
}

function findGuaIds(name) {
  const entry = Object.entries(HEX_MAP).find(([k,v]) => v === name);
  if (!entry) return [1,1];
  return entry[0].split(",").map(Number);
}

    btn.classList.add('active');
    selectedSc = sh.id;
    document.getElementById('result').style.display = 'none';
  };
  grid.appendChild(btn);
});

function onStrokeInput() {
  const s = parseInt(document.getElementById('strokeInput').value, 10);
  const box = document.getElementById('previewBox');
  if (s && s > 0) {
    const uid = upperGua(s);
    document.getElementById('previewGua').textContent = BAGUA[uid-1].name;
    box.style.display = 'flex';
  } else {
    box.style.display = 'none';
  }
  document.getElementById('result').style.display = 'none';
}

function renderHexLines(uid, lid, cl, dim) { return ""; }

function renderCard(label, name, uid, lid, cl, dim) {
  const d = DESC[name];
  const u = BAGUA[uid-1], l = BAGUA[lid-1];
  const dimClass = dim ? 'dim' : '';

  let badgeHtml = '';
  if (!dim && cl) badgeHtml = `<div class="change-badge">${LINE_NAMES[cl-1]}動</div>`;

  let descHtml = '';
  if (d) {
    let yaoHtml = '';
    if (!dim) {
      yaoHtml = `<div class="yao-section">
        <div class="yao-header">── 六爻辭 ──</div>
        ${d.yao.map((y,i) => {
          const active = cl && i === cl-1 ? 'active' : '';
          return `<div class="yao-item ${active}">
            <div class="yao-ci">${LINE_NAMES[i]}　${y.ci}</div>
            <div class="yao-bai">${y.bai}</div>
          </div>`;
        }).join('')}
      </div>`;
    } else {
      yaoHtml = `<div class="yao-section dim-yao">
        <div class="yao-header" style="color:#252540">── 卦辭參考 ──</div>
        ${d.yao.map((y,i) => `<div class="yao-item">
          <div class="yao-ci">${LINE_NAMES[i]}　${y.ci}</div>
          <div class="yao-bai">${y.bai}</div>
        </div>`).join('')}
      </div>`;
    }
    descHtml = `<div class="card-desc">
      <div class="desc-kw">${d.kw}</div>
      <div class="desc-summary">${d.s}</div>
      ${yaoHtml}
    </div>`;
  }

  return `<div class="hex-card ${dimClass}">
    <div class="card-label">${label}</div>
    <div class="card-top">
      ${renderHexLines(uid, lid, cl, dim)}
      <div class="card-info">
        <div class="hex-name">${name}</div>
        <div class="hex-sub">${u.element}${u.name}上 · ${l.element}${l.name}下</div>
        ${badgeHtml}
      </div>
    </div>
    ${descHtml}
  </div>`;
}

function calculate() {
  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';
  const s = parseInt(document.getElementById('strokeInput').value, 10);
  if (!s || s < 1) { errEl.textContent = '請輸入有效的筆畫數'; errEl.style.display = 'block'; return; }
  if (!selectedSc) { errEl.textContent = '請選擇時辰'; errEl.style.display = 'block'; return; }

  const uid = upperGua(s);
  const lid = lowerGua(uid, selectedSc);
  const hn = hexName(uid, lid);
  const cl = changingLine(s, selectedSc);
  const zhn = applyChange(hn, cl);
  const [zui, zli] = findGuaIds(zhn);
  const [fuu, ful] = findGuaIds(hn);
  const allLines = [...BAGUA[ful-1].lines, ...BAGUA[fuu-1].lines]; const lineYang = allLines[cl-1] === 1;

  const scName = SHICHEN[selectedSc-1].zhi;

  const html = `
    <div class="trail">
      <span class="gold">${s}</span> 劃 ÷ 8 餘 <span>${uid}</span> → 上卦 <span>${BAGUA[uid-1].name}</span><br>
      從${BAGUA[uid-1].name}下一卦數 <span class="gold">${selectedSc}</span>（${scName}時）步 → 下卦 <span>${BAGUA[lid-1].name}</span><br>
      (${s} + ${selectedSc}) ÷ 6 餘 <span>${cl}</span> → ${LINE_NAMES[cl-1]}爻動（${lineYang?'陽轉陰':'陰轉陽'}）
    </div>
    ${renderCard('本　卦', hn, uid, lid, cl, false)}
    <div class="divider">── ${LINE_NAMES[cl-1]}爻${lineYang?'陽轉陰':'陰轉陽'} → 之卦 ──</div>
    ${renderCard('之　卦', zhn, zui, zli, null, true)}
  `;

  const resultEl = document.getElementById('result');
  resultEl.innerHTML = html;
  resultEl.style.display = 'flex';
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
